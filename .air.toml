root = "."
tmp_dir = "tmp"

[build]
  cmd = "templ generate && go build -o ./tmp/dev ./cmd/dev/main.go"
  bin = "./tmp/dev"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "dist"]
  include_ext = ["go", "tpl", "tmpl", "templ", "html", "md", "css"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  follow_symlink = true
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = false
